name: Publish npmjs

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-npmjs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PACKAGE_NAME: "@crawlora-org/sdk"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          scope: "@crawlora-org"
      - name: Validate release tag
        run: |
          version="$(node -p 'require("./package.json").version')"
          if [ "${GITHUB_REF_TYPE}" = "tag" ] && [ "${GITHUB_REF_NAME}" != "v${version}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${version}" >&2
            exit 1
          fi
          echo "Publishing ${PACKAGE_NAME}@${version} to npmjs"
      - name: Regenerate SDK
        run: npm run generate
      - name: Check generated files
        run: git diff --exit-code
      - name: Test
        run: npm test
      - name: Typecheck declarations
        run: npm run typecheck
      - name: Pack check
        run: npm run pack:check
      - name: Check package version
        id: package
        run: |
          version="$(node -p 'require("./package.json").version')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if npm pack "${PACKAGE_NAME}@${version}" --dry-run --json --registry=https://registry.npmjs.org >/tmp/package-pack.json 2>/tmp/package-pack.err; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            cat /tmp/package-pack.json
          else
            code=$?
            if grep -Eq "E404|ETARGET|notarget|not found|No matching version" /tmp/package-pack.err; then
              echo "published=false" >> "$GITHUB_OUTPUT"
            else
              cat /tmp/package-pack.err
              exit "$code"
            fi
          fi
      - name: Publish
        if: steps.package.outputs.published == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          test -n "${NODE_AUTH_TOKEN}"
          npm publish --registry=https://registry.npmjs.org --access public
      - name: Verify install
        run: |
          tmp="$(mktemp -d)"
          cd "$tmp"
          npm init -y >/dev/null
          version="${{ steps.package.outputs.version }}"
          for attempt in $(seq 1 18); do
            # --prefer-online avoids a stale cached packument right after publish;
            # without it npm keeps returning ETARGET from cache and the retry is moot.
            if npm install "${PACKAGE_NAME}@${version}" --registry=https://registry.npmjs.org --prefer-online; then
              node -e 'import("@crawlora-org/sdk").then((m) => console.log(Object.keys(m).sort().join(",")))'
              exit 0
            fi
            echo "Package not installable yet; retrying in 15s (${attempt}/18)"
            sleep 15
          done
          # The publish step already succeeded; registry/CDN propagation lag is
          # outside our control, so don't fail the release on a slow index.
          echo "::warning::${PACKAGE_NAME}@${version} published but not yet installable (registry propagation lag); skipping install verification."
