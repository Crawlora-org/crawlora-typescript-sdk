name: Publish GitHub Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-github-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PACKAGE_NAME: "@crawlora-org/sdk"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@crawlora-org"
      - name: Validate release tag
        run: |
          version="$(node -p 'require("./package.json").version')"
          if [ "${GITHUB_REF_TYPE}" = "tag" ] && [ "${GITHUB_REF_NAME}" != "v${version}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${version}" >&2
            exit 1
          fi
          echo "Publishing ${PACKAGE_NAME}@${version} to GitHub Packages"
      - name: Regenerate SDK
        run: npm run generate
      - name: Check generated files
        run: git diff --exit-code
      - name: Test
        run: npm test
      - name: Typecheck declarations
        run: npm run typecheck
      - name: Pack check
        run: npm run pack:check
      - name: Check package version
        id: package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="$(node -p 'require("./package.json").version')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if npm pack "${PACKAGE_NAME}@${version}" --dry-run --json --registry=https://npm.pkg.github.com >/tmp/package-pack.json 2>/tmp/package-pack.err; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            cat /tmp/package-pack.json
          else
            code=$?
            if grep -Eq "E404|ETARGET|notarget|not found|No matching version" /tmp/package-pack.err; then
              echo "published=false" >> "$GITHUB_OUTPUT"
            else
              cat /tmp/package-pack.err
              exit "$code"
            fi
          fi
      - name: Publish
        if: steps.package.outputs.published == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm pkg set publishConfig.registry=https://npm.pkg.github.com
          npm publish --registry=https://npm.pkg.github.com --access public
      - name: Verify install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tmp="$(mktemp -d)"
          cd "$tmp"
          printf '@crawlora-org:registry=https://npm.pkg.github.com\n//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}\n' > .npmrc
          npm init -y
          for attempt in $(seq 1 12); do
            if npm install "${PACKAGE_NAME}@${{ steps.package.outputs.version }}"; then
              break
            fi
            if [ "$attempt" = "12" ]; then
              exit 1
            fi
            echo "Package not installable yet; retrying in 10 seconds (${attempt}/12)"
            sleep 10
          done
          node -e 'import("@crawlora-org/sdk").then((m) => console.log(Object.keys(m).sort().join(",")))'
